<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 사용 검사</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:40px;
}
.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}
textarea{
    width:100%;
    height:220px;
    padding:10px;
    font-size:16px;
}
button{
    margin-top:15px;
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}
#result{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
<h2>AI 사용 검사 (간단한 데모)</h2>

<textarea id="text" placeholder="문장을 입력하세요."></textarea>

<button onclick="checkAI()">검사하기</button>

<div id="result"></div>
</div>

<script>
function checkAI(){

    const text=document.getElementById("text").value.trim();

    if(text.length<30){
        document.getElementById("result").innerHTML="❗30자 이상 입력해주세요.";
        return;
    }

    let score=0;

    const keywords=[
        "결론적으로",
        "요약하면",
        "또한",
        "따라서",
        "효율적",
        "중요합니다",
        "전반적으로",
        "한편"
    ];

    keywords.forEach(word=>{
        if(text.includes(word)) score+=8;
    });

    const sentences=text.split(/[.!?\n]/).filter(s=>s.trim()!="");

    if(sentences.length>4){
        let avg=text.length/sentences.length;
        if(avg>45) score+=20;
    }

    if(text.length>500) score+=15;

    score=Math.min(score,100);

    let msg="";

    if(score<30){
        msg="🟢 AI 작성 가능성 낮음 ("+score+"%)";
    }else if(score<60){
        msg="🟡 AI 작성 가능성 보통 ("+score+"%)";
    }else{
        msg="🔴 AI 작성 가능성 높음 ("+score+"%)";
    }

    document.getElementById("result").innerHTML=msg;
}
</script>

</body>
</html>
