<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 사용 검사</title>


<style>
/* 배경색을 세련된 소프트 블루 그라데이션으로 변경 */
body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    background: linear-gradient(135deg, #edf2f9 0%, #dbeafe 100%);
    margin: 0;
    padding: 40px 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    box-sizing: border-box;
}

/* 상단 타이틀 텍스트 색상 변경 */
.header-wrapper {
    width: 100%;
    max-width: 720px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.header-wrapper h2 {
    margin: 0;
    font-size: 24px;
    color: #1e3a8a; /* 딥 네이비 */
    font-weight: 800;
    letter-spacing: -0.5px;
}

/* APK 버튼을 고급스러운 오션 블루 그라데이션으로 변경 */
.apk-download-btn {
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
    text-decoration: none;
    border-radius: 30px;
    box-shadow: 0 4px 14px rgba(2, 132, 199, 0.3);
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 6px;
}
.apk-download-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(2, 132, 199, 0.4);
    background: linear-gradient(135deg, #0369a1 0%, #075985 100%);
}

.container {
    width: 100%;
    max-width: 720px;
    background: rgba(255, 255, 255, 0.95);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(30, 58, 138, 0.05); /* 푸른빛 도는 그림자 */
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.8);
    box-sizing: border-box;
}

/* 입력창 테두리 포커스 색상을 오션 블루로 변경 */
textarea {
    width: 100%;
    height: 240px;
    padding: 18px;
    font-size: 16px;
    border: 1px solid #cbd5e1;
    border-radius: 12px;
    box-sizing: border-box;
    resize: none;
    background-color: #f8fafc;
    color: #334155;
    transition: all 0.3s ease;
    line-height: 1.6;
}
textarea:focus {
    outline: none;
    border-color: #0284c7;
    background-color: #fff;
    box-shadow: 0 0 0 4px rgba(2, 132, 199, 0.15);
}

/* 분석 버튼을 신뢰감을 주는 인디고 딥 블루로 변경 */
.check-btn {
    width: 100%;
    margin-top: 20px;
    padding: 15px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
    color: white;
    border: none;
    border-radius: 12px;
    box-shadow: 0 4px 14px rgba(30, 64, 175, 0.3);
    transition: all 0.3s ease;
}
.check-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(30, 64, 175, 0.4);
}
.check-btn:active {
    transform: translateY(1px);
}

#result {
    margin-top: 25px;
    padding: 25px;
    border-radius: 16px;
    background: #ffffff;
    border: 1px solid #e2e8f0;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
}

.gauge-container {
    width: 100%;
    height: 12px;
    background-color: #e2e8f0;
    border-radius: 6px;
    margin-top: 10px;
    margin-bottom: 20px;
    overflow: hidden;
}
.gauge-bar {
    height: 100%;
    width: 0%;
    border-radius: 6px;
    transition: width 0.6s cubic-bezier(0.1, 0.8, 0.3, 1);
}

/* 분석 수치 내부의 스펙 칩 배경색을 부드러운 아이스 블루로 변경 */
.metric-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 20px;
}
.metric-chip {
    background: #f0f5ff;
    border: 1px solid #e0eafd;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    color: #1e3a8a;
}
.metric-chip b {
    color: #0f172a;
    float: right;
}

.result-title {
    font-size: 18px;
    font-weight: 800;
    margin-top: 15px;
    padding: 14px;
    border-radius: 10px;
    text-align: center;
}

/* 결과 분류 색상 톤을 가독성 좋은 파스텔 계열로 매칭 */
.score-red { color: #e11d48; }
.score-yellow { color: #d97706; }
.score-green { color: #059669; }

.bg-red { background-color: #ffe4e6; color: #9f1239; }
.bg-yellow { background-color: #fef3c7; color: #92400e; }
.bg-green { background-color: #d1fae5; color: #065f46; }

.bar-red { background: linear-gradient(90deg, #fda4af, #e11d48); }
.bar-yellow { background: linear-gradient(90deg, #fde047, #d97706); }
.bar-green { background: linear-gradient(90deg, #6ee7b7, #059669); }

    /* 전체 지우기 버튼 스타일 (차분한 그레이 톤) */
.clear-btn {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    background: #e2e8f0;
    color: #475569;
    border: none;
    border-radius: 12px;
    transition: all 0.3s ease;
}
.clear-btn:hover {
    background: #cbd5e1;
    color: #1e293b;
}

</style>
</head>
<body>

<!-- 제목과 다운로드 버튼을 묶어주는 상단 헤더 영역 -->
<div class="header-wrapper">
    <h2>AI 사용 검사</h2>
    <!-- YOUR_DOWNLOAD_LINK_HERE 부분에 실제 파일 주소를 넣으시면 됩니다 -->
    <a href="AI_Detector.apk" class="apk-download-btn" download>📱 Web App .apk 다운로드</a>
</div>

<div class="container">
<textarea id="text" placeholder="문장을 입력하세요."></textarea>


<button class="clear-btn" onclick="clearText()">전체 지우기</button>


<button class="check-btn" onclick="checkAI()">검사하기</button>

<div id="result" style="display:none;"></div>
</div>

<script>
    // 입력창과 결과창을 모두 초기화하는 함수
function clearText() {
    document.getElementById("text").value = "";
    const result = document.getElementById("result");
    result.style.display = "none";
    result.innerHTML = "";
}

function checkAI() {
    const text = document.getElementById("text").value.trim();
    const result = document.getElementById("result");

    if (text.length < 20) {
        result.style.display = "block";
        result.innerHTML = "<b style='color:#dc3545;'>20자 이상 입력해주세요.</b>";
        return;
    }

    let aiScore = 0;

    // ==========================
    // 1. AI 빈출 단어 및 서술어 패턴 (가중치 차등 부여)
    // ==========================
    const aiHighWords = ["결론적으로", "요약하면", "종합하면", "따라서", "전반적으로", "궁극적으로", "주목할 만한", "흥미로운 점은"];
    const aiMidWords = ["또한", "한편", "즉", "예를 들어", "이를 통해", "알 수 있습니다", "효율적", "중요합니다", "제공합니다", "분석됩니다"];
    
    const aiPatterns = /(할 수 있습니다|제공합니다|분석됩니다|도움을 줍니다|기대됩니다)\./g;

    aiHighWords.forEach(word => { if (text.includes(word)) aiScore += 12; });
    aiMidWords.forEach(word => { if (text.includes(word)) aiScore += 6; });
    
    const patternCount = (text.match(aiPatterns) || []).length;
    aiScore += patternCount * 8;

    // ==========================
    // 2. 문장 분석 (변동성 기준 완화 및 계층화)
    // ==========================
    const sentences = text.split(/[.!?\n]/).filter(s => s.trim() !== "");
    const lengths = sentences.map(s => s.length);
    const avg = lengths.reduce((a, b) => a + b, 0) / lengths.length;
    const variance = lengths.reduce((a, b) => a + Math.pow(b - avg, 2), 0) / lengths.length;
    const deviation = Math.sqrt(variance);

    if (deviation < 16) aiScore += 25;
    else if (deviation < 25) aiScore += 10;

    // ==========================
    // 3. 단어 반복 검사 (기준 하향)
    // ==========================
    const words = text.replace(/[^\w가-힣 ]/g, "").split(/\s+/);
    const map = {};

    words.forEach(word => {
        if (word.length < 2) return;
        map[word] = (map[word] || 0) + 1;
    });

    let repeat = 0;
    Object.values(map).forEach(v => {
        if (v >= 3) repeat++;
    });

    aiScore += repeat * 5;

    // ==========================
    // 4. 사람 흔적 검사 (감점 상한선 적용)
    // ==========================
    const casual = (text.match(/ㅋㅋ|ㅎㅎ|ㅠㅠ|ㅜㅜ|\.\.\.|!!|~|근데|솔직히/g) || []).length;
    aiScore -= Math.min(20, casual * 5);

    // ==========================
    // 5. 문단 길이 차이
    // ==========================
    const paragraphs = text.split(/\n\s*\n/);
    if (paragraphs.length >= 2) {
        const paraLen = paragraphs.map(v => v.length);
        if (Math.max(...paraLen) - Math.min(...paraLen) > 100) {
            aiScore -= 10;
        }
    }

    // ==========================
    // 6. 길이 보정 (최솟값 안전장치)
    // ==========================
    const len = text.length;
    const lengthFactor = Math.max(0.5, Math.min(1, Math.log(len + 1) / Math.log(1000)));
    aiScore *= lengthFactor;

    // ==========================
    // 7. 조사 띄어쓰기 실수 검사 (인간적인 실수로 판별)
    // ==========================
    const spacingError = text.match(/[가-힣]+\s+(은|는|이|가|을|를|와|과)\b/g) || [];
    const spacingCount = spacingError.length;
    aiScore -= Math.min(15, spacingCount * 5);

    aiScore = Math.round(Math.max(0, Math.min(aiScore, 100)));

    const diversity = Math.min(100, Math.round(deviation * 2));
    const confidence = Math.min(100, Math.round(lengthFactor * 100));

    //낮게 나와서*2
    aiScore*=2;
    

    // ==========================
    // 최종 결과 메시지 및 색상 지정
    // ==========================
    let finalResult = "";
    let scoreClass = "";

    if (aiScore >= 50) {
        finalResult = "🔴 AI 작성 가능성이 높습니다.";
        scoreClass = "score-red";
    } else if (aiScore >= 25) {
        finalResult = "🟡 AI 초안을 사람이 수정했을 가능성이 있습니다.";
        scoreClass = "score-yellow";
    } else {
        finalResult = "🟢 사람이 작성했을 가능성이 높습니다.";
        scoreClass = "score-green";
    }

    // ==========================
    // 결과 출력
    // ==========================
    result.style.display = "block";
    result.innerHTML = `
        <h3>분석 결과</h3>
        AI 작성 가능성 : <b class="${scoreClass}" style="font-size:24px;">${aiScore}%</b><br><br>
        
        <div style="font-size:14px; color:#555; line-height: 1.6;">
            • 문장 다양성(표준편차 배율): <b>${diversity}%</b> (실제 편차: ${deviation.toFixed(1)})<br>
            • 과도한 단어 반복: <b>${repeat}개</b><br>
            • 분석 신뢰도: <b>${confidence}%</b> (공백 포함 글자수: ${len}자)<br>
            • 맞춤법(조사) 실수 발견: <b>${spacingCount}개</b>
        </div>
        
        <div class="result-title">${finalResult}</div>
        <br>
        <small style="color:#888;">
        ※ 이 결과는 통계적·휴리스틱 기반의 참고용 추정이며, AI 사용 여부를 확정적으로 판별하지는 않습니다.
        </small>
    `;
}
</script>

</body>
</html>
