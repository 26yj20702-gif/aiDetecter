<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 사용 검사</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:40px;
}
.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}
textarea{
    width:100%;
    height:220px;
    padding:10px;
    font-size:16px;
}
button{
    margin-top:15px;
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}
#result{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
<h2>AI 사용 검사 (간단한 데모)</h2>

<textarea id="text" placeholder="문장을 입력하세요."></textarea>

<button onclick="checkAI()">검사하기</button>

<div id="result"></div>
</div>

<script>
function checkAI() {

    const text = document.getElementById("text").value.trim();
    const result = document.getElementById("result");

    if (text.length < 20) {
        result.innerHTML = "20자 이상 입력해주세요.";
        return;
    }

    let aiScore = 0;
    let humanScore = 0;

    // ==========================
    // AI에서 자주 보이는 표현
    // ==========================

    const aiWords = [
        "결론적으로",
        "요약하면",
        "또한",
        "따라서",
        "전반적으로",
        "효율적",
        "중요합니다",
        "한편",
        "즉",
        "예를 들어",
        "종합하면",
        "이를 통해",
        "알 수 있습니다"
    ];

    aiWords.forEach(word => {
        if (text.includes(word))
            aiScore += 5;
    });

    // ==========================
    // 문장 분석
    // ==========================

    const sentences = text
        .split(/[.!?\n]/)
        .filter(s => s.trim() !== "");

    const lengths = sentences.map(s => s.length);

    const avg =
        lengths.reduce((a, b) => a + b, 0) /
        lengths.length;

    const variance =
        lengths.reduce((a, b) =>
            a + Math.pow(b - avg, 2), 0
        ) / lengths.length;

    const deviation = Math.sqrt(variance);

    // 문장 길이가 일정하면 AI
    if (deviation < 12)
        aiScore += 18;
    else
        humanScore += 18;

    // ==========================
    // 단어 반복
    // ==========================

    const words = text
        .replace(/[^\w가-힣 ]/g, "")
        .split(/\s+/);

    const map = {};

    words.forEach(word => {

        if (word.length < 2)
            return;

        map[word] = (map[word] || 0) + 1;

    });

    let repeat = 0;

    Object.values(map).forEach(v => {

        if (v >= 5)
            repeat++;

    });

    aiScore += repeat * 4;

    // ==========================
    // 사람 흔적
    // ==========================

    const casual =
        (text.match(/ㅋㅋ|ㅎㅎ|ㅠㅠ|ㅜㅜ|...|!!|~|근데|솔직히/g) || []).length;

    humanScore += casual * 5;

    // ==========================
    // 문단 길이 차이
    // ==========================

    const paragraphs = text.split(/\n\s*\n/);

    if (paragraphs.length >= 2) {

        const paraLen =
            paragraphs.map(v => v.length);

        if (Math.max(...paraLen) - Math.min(...paraLen) > 100)
            humanScore += 12;

    }

    // ==========================
    // 길이 보정 (로그)
    // ==========================

    const len = text.length;

    const lengthFactor =
        Math.min(
            1,
            Math.log(len + 1) / Math.log(1000)
        );

    aiScore *= lengthFactor;

    // 짧을수록 사람 점수를 크게 올리지 않고 약간만 보정
    humanScore += (1 - lengthFactor) * 15;

    // ==========================
    // 다양성
    // ==========================

    const diversity =
        Math.min(
            100,
            Math.round(deviation * 2)
        );

    // ==========================
    // 신뢰도
    // ==========================

    const confidence =
        Math.round(
            Math.min(
                100,
                Math.log(len + 1) /
                Math.log(2000) *
                100
            )
        );

    aiScore = Math.round(Math.min(aiScore, 100));
    humanScore = Math.round(Math.min(humanScore, 100));

    // ==========================
    // 최종 결과
    // ==========================

    let finalResult = "";

    if (aiScore >= 70 && humanScore < 40) {

        finalResult = "🔴 AI 작성 가능성이 높습니다.";

    } else if (aiScore >= 45 && humanScore >= 30) {

        finalResult = "🟡 AI 초안을 사람이 수정했을 가능성이 있습니다.";

    } else {

        finalResult = "🟢 사람이 작성했을 가능성이 높습니다.";

    }

    // ==========================
    // 출력
    // ==========================

    result.innerHTML = `
    <h3>분석 결과</h3>

    AI 작성 가능성 :
    <b>${aiScore}%</b><br>

    사람 수정 흔적 :
    <b>${humanScore}%</b><br>

    문장 다양성 :
    <b>${diversity}%</b><br>

    반복 표현 :
    <b>${repeat}개</b><br>

    분석 신뢰도 :
    <b>${confidence}%</b><br><br>

    <h2>${finalResult}</h2>

    <small>
    ※ 이 결과는 통계적·휴리스틱 기반의 참고용 추정이며,
    AI 사용 여부를 확정적으로 판별하지는 않습니다.
    </small>
    `;

}
</script>

</body>
</html>
